name: 一键批量打包所有设备固件

on:
  workflow_dispatch:
    inputs:
      openwrt_kernel:
        description: '内核版本'
        required: true
        default: '6.6.y'
        type: choice
        options:
          - '6.6.y'
          - '6.12.y'
          - '6.18.y'
      auto_kernel:
        description: '自动使用最新内核'
        required: false
        default: true
        type: boolean

env:
  VERSION: 24.10.5

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 从 St2 工作流中解析所有设备型号
        id: set-matrix
        run: |
          # 提取 St2 文件中 options: 下的所有 - xxxx 行
          DEVICES=$(grep -A 1000 "options:" .github/workflows/St2_Build-iStoreOS-ib.yml | \
                    grep -E '^\s+- [a-zA-Z0-9_-]+' | \
                    sed 's/^\s+- //' | \
                    jq -R . | jq -cs .)
          echo "matrix={\"device\":$DEVICES}" >> $GITHUB_OUTPUT

  build-all:
    needs: prepare-matrix
    runs-on: ubuntu-22.04   # 与 St2 保持一致
    strategy:
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 下载基础 rootfs.tar.gz 包
        run: |
          echo "📦 正在下载 rootfs 包"
          mkdir -p bin/targets/armsr/armv8
          curl -L -o bin/targets/armsr/armv8/openwrt-armvirt-64-default-rootfs.tar.gz \
            https://github.com/${{ github.actor }}/iStoreOS-Actions/releases/download/iStoreOS-${{ env.VERSION }}-RELEASE-dhcp/istoreos-armsr-armv8-generic-rootfs.tar.gz

      - name: 查找 rootfs.tar.gz 文件
        id: find_rootfs
        run: |
          ROOTFS_FILE=$(find bin/targets/armsr/armv8/ -type f -name "*rootfs.tar.gz" | head -n1)
          echo "✅ 找到文件: $ROOTFS_FILE"
          if [ ! -f "$ROOTFS_FILE" ]; then
            echo "❌ 找不到 rootfs.tar.gz 文件"
            exit 1
          fi
          echo "file=$ROOTFS_FILE" >> $GITHUB_OUTPUT

      - name: 为设备 ${{ matrix.device }} 打包固件
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: ${{ steps.find_rootfs.outputs.file }}
          openwrt_board: ${{ matrix.device }}
          openwrt_kernel: ${{ github.event.inputs.openwrt_kernel }}
          auto_kernel: ${{ github.event.inputs.auto_kernel }}
          kernel_repo: ophub/kernel
          kernel_usage: stable
          builder_name: kwonelee   # 可选，与 St2 一致

      - name: 调整 .img.gz 文件名
        run: |
          for FILE in ${{ env.PACKAGED_OUTPUTPATH }}/*.img.gz; do
            echo "处理文件: $FILE"
            FILENAME=$(basename "$FILE")
            NEW_FILENAME=$(echo "$FILENAME" | sed "s/openwrt/istoreos_${{ env.VERSION }}/g")
            if [ "$FILENAME" != "$NEW_FILENAME" ]; then
              mv "$FILE" "${{ env.PACKAGED_OUTPUTPATH }}/$NEW_FILENAME"
              echo "已重命名: $FILENAME -> $NEW_FILENAME"
            else
              echo "无需重命名: $FILENAME"
            fi
          done

      - name: 上传固件到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: iStoreOS-${{ env.VERSION }}-ALL-DEVICES
          files: ${{ env.PACKAGED_OUTPUTPATH }}/*.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
