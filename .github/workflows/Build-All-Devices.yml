name: 一键批量打包所有设备固件

on:
  workflow_dispatch:
    inputs:
      openwrt_kernel:
        description: "内核版本系列"
        required: true
        default: "6.6.y"
        type: choice
        options:
          - "6.6.y"
          - "6.12.y"
          - "6.18.y"
      auto_kernel:
        description: "自动使用该系列最新内核（如果未指定kernel_tags）"
        required: false
        default: true
        type: boolean

env:
  VERSION: 24.10.5
  ROOTFS_TYPE: RELEASE
  NETWORK: dhcp

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 解析设备列表
        id: set-matrix
        run: |
          DEVICES=$(grep -A 1000 "options:" .github/workflows/St2_Build-iStoreOS-ib.yml | \
                    grep -E '^\s+- [a-zA-Z0-9_-]+' | \
                    sed 's/^\s+- //' | \
                    jq -R . | jq -cs .)
          echo "matrix={\"device\":$DEVICES}" >> $GITHUB_OUTPUT

  build-all:
    needs: prepare-matrix
    runs-on: ubuntu-22.04
    strategy:
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 下载 rootfs.tar.gz
        run: |
          echo "📦 正在下载预构建 rootfs"
          mkdir -p bin/targets/armsr/armv8
          curl -L -o bin/targets/armsr/armv8/openwrt-armvirt-64-default-rootfs.tar.gz \
            https://github.com/${{ github.actor }}/iStoreOS-Actions/releases/download/iStoreOS-${{ env.VERSION }}-${{ env.ROOTFS_TYPE }}-${{ env.NETWORK }}/istoreos-armsr-armv8-generic-rootfs.tar.gz

      - name: 查找 rootfs.tar.gz 路径
        id: find_rootfs
        run: |
          ROOTFS_FILE=$(find bin/targets/armsr/armv8/ -type f -name "*rootfs.tar.gz" | head -n1)
          echo "✅ 找到: $ROOTFS_FILE"
          if [ ! -f "$ROOTFS_FILE" ]; then
            echo "❌ 找不到 rootfs.tar.gz 文件"
            exit 1
          fi
          echo "file=$ROOTFS_FILE" >> $GITHUB_OUTPUT

      - name: 获取指定内核系列的最新标签
        id: kernel_tag
        run: |
          # 根据用户选择的内核系列（如6.6.y）获取实际可用的内核标签
          # 这里使用 GitHub API 从 ophub/kernel 仓库获取最新稳定版
          KERNEL_SERIES="${{ github.event.inputs.openwrt_kernel }}"
          # 去掉末尾的 .y，例如 6.6.y -> 6.6
          KERNEL_MAJOR=$(echo "$KERNEL_SERIES" | sed 's/\.y$//')
          # 获取该系列最新的标签（例如 6.6.132）
          LATEST_TAG=$(curl -s "https://api.github.com/repos/ophub/kernel/tags" | \
                       jq -r ".[].name" | \
                       grep -E "^$KERNEL_MAJOR\.[0-9]+$" | \
                       sort -V | tail -n1)
          if [ -z "$LATEST_TAG" ]; then
            # 如果获取失败，使用一个已知可用的标签
            LATEST_TAG="6.6.132"
          fi
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "使用内核标签: $LATEST_TAG"

      - name: 打包固件 for ${{ matrix.device }}
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: ${{ steps.find_rootfs.outputs.file }}
          openwrt_board: ${{ matrix.device }}
          openwrt_kernel: ${{ github.event.inputs.openwrt_kernel }}
          auto_kernel: false   # 关闭自动获取，使用下面指定的 kernel_tags
          kernel_tags: ${{ steps.kernel_tag.outputs.tag }}
          kernel_repo: ophub/kernel
          kernel_usage: stable
          builder_name: kwonelee

      - name: 调整固件文件名
        run: |
          for FILE in ${{ env.PACKAGED_OUTPUTPATH }}/*.img.gz; do
            echo "处理: $FILE"
            FILENAME=$(basename "$FILE")
            NEW_FILENAME=$(echo "$FILENAME" | sed "s/openwrt/istoreos_${{ env.VERSION }}/g")
            if [ "$FILENAME" != "$NEW_FILENAME" ]; then
              mv "$FILE" "${{ env.PACKAGED_OUTPUTPATH }}/$NEW_FILENAME"
              echo "已重命名: $FILENAME -> $NEW_FILENAME"
            fi
          done

      - name: 上传固件到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: iStoreOS-${{ env.VERSION }}-ALL-DEVICES
          files: ${{ env.PACKAGED_OUTPUTPATH }}/*.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}