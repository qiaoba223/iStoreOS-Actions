
name: 一键批量打包所有设备固件（固定设备列表）

on:
  workflow_dispatch:
    inputs:
      openwrt_kernel:
        description: "内核版本系列"
        required: true
        default: "6.6.y"
        type: choice
        options:
          - "6.6.y"
          - "6.12.y"
          - "6.18.y"
      auto_kernel:
        description: "自动使用该系列最新内核"
        required: false
        default: true
        type: boolean

env:
  VERSION: 24.10.5
  ROOTFS_TYPE: RELEASE
  NETWORK: dhcp

